services:
  postgres:
    image: postgres:15
    container_name: my_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postpost
      POSTGRES_DB: mydb
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  backend:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - postgres

volumes:
  postgres_data: